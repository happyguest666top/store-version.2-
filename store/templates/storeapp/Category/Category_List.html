<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Категорії товарів</h1>
<ul>
  {% for category in categories %}
    <li>
      <a href="{{ category.get_absolute_url }}">{{ category.title }}</a>
      (Товарів: {{ category.product_count }})
    </li>
  {% endfor %}
</ul>
</body>
</html>
