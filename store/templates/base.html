<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мій магазин{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'storeapp:home' %}">Shop</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'storeapp:product_list' %}">Продукти</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'storeapp:category_list' %}">Категорії</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'storeapp:manufacturer_list' %}">Виробники</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'storeapp:order_list' %}">Замовлення</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'storeapp:cart' %}">Кошик</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'storeapp:about' %}">Про нас</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'storeapp:profile' %}">
                            Профіль ({{ user.username }})
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="{% url 'storeapp:logout' %}">
                            Вийти
                        </a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'storeapp:login' %}">
                            Увійти
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'storeapp:register' %}">
                            Реєстрація
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="bg-light text-center text-muted py-3 mt-5">
    <small>© 2026 Мій Django магазин</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
